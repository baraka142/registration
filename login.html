<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Login/Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css">
</head>

<body class="flex items-center justify-center min-h-screen">
    <div id="authContainer" class="theme-card p-8 w-full max-w-md mx-auto">
        <h2 id="formTitle" class="text-3xl font-bold text-center text-white mb-6">Log In to Your Account</h2>

        <div id="messageBox" class="message-box"></div>

        <form id="loginForm" action="#" method="POST" class="space-y-4">
            <div>
                <label for="loginEmail" class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <input type="email" id="loginEmail" name="loginEmail" placeholder="Enter your email"
                    class="mt-1 block w-full px-4 py-2 border border-gray-600 bg-gray-700 text-white rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                    required>
            </div>
            <div>
                <label for="loginPassword" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="loginPassword" name="loginPassword" placeholder="Enter your password"
                    class="mt-1 block w-full px-4 py-2 border border-gray-600 bg-gray-700 text-white rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                    required>
            </div>
            <button type="submit" id="loginButton"
                class="w-full flex justify-center items-center py-2 px-4 border border-transparent rounded-md shadow-sm text-lg font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Log In
                <svg id="loginSpinner" class="hidden spinner ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
            </button>
        </form>

        <!-- Admin Login Link -->
        <div class="mt-8 text-center text-gray-500 text-sm">
            Are you an administrator? <a href="admin-dashboard" class="text-indigo-600 hover:underline">Go to Admin
                Login</a>
        </div>
    </div>




    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, doc, updateDoc, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your specific Firebase Configuration provided by Alvine
        const firebaseConfig = {
            apiKey: "AIzaSyBRVqHDVjcXdrIm6OolwzPlaB7LYQFFtFc",
            authDomain: "baraka-bot-registration.firebaseapp.com",
            projectId: "baraka-bot-registration",
            storageBucket: "baraka-bot-registration.firebasestorage.app",
            messagingSenderId: "289777012967",
            appId: "1:289777012967:web:5c59480a4e4e2a13f09242",
            measurementId: "G-EKH2MN7WDR"
        };

        const appId = firebaseConfig.projectId;
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const authContainer = document.getElementById('authContainer');
        const loginForm = document.getElementById('loginForm');
        const formTitle = document.getElementById('formTitle');
        const messageBox = document.getElementById('messageBox');
        const loginButton = document.getElementById('loginButton');
        const logoutButton = document.getElementById('logoutButton');

        // Spinners
        const loginSpinner = document.getElementById('loginSpinner');

        // Global variable to store the Firestore document ID for the current user's profile
        let currentUserProfileDocId = null;

        // Function to display messages in the main message box
        function showMessage(message, type = 'error') {
            messageBox.innerHTML = `<span class="icon">${type === 'success' ? '✔' : type === 'loading' ? '⌛' : '⚠'}</span>${message}`;
            messageBox.className = `message-box ${type}`;
            messageBox.style.display = 'flex';
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        }

        // Function to show the dashboard and populate with user data
        async function showDashboard(user) {
            if (user.email === 'wangilabaraka@gmail.com') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'index.html';
            }
        }

        // Handle initial auth state (e.g., if user is already logged in from a previous session)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                showDashboard(user);
            } else {
                authContainer.classList.remove('hidden');
                messageBox.style.display = 'none';
            }
        });


        // --- Firebase Login Logic ---
        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            loginButton.disabled = true;
            loginSpinner.classList.remove('hidden');
            showMessage('Logging in...', 'loading');

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                showMessage('Login successful! Redirecting to dashboard...', 'success');
                loginForm.reset();
                await showDashboard(user);

            } catch (error) {
                console.error("Error during login:", error);
                let errorMessage = 'Login failed. Please try again.';
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect email or password. Please try again.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Please enter a valid email address.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many failed login attempts. Please try again later.';
                }
                showMessage(errorMessage, 'error');
            } finally {
                loginButton.disabled = false;
                loginSpinner.classList.add('hidden');
            }
        });

        // --- Firebase Logout Logic ---
        logoutButton.addEventListener('click', async () => {
            try {
                await signOut(auth);
                showMessage('You have been logged out successfully.', 'success');
                // Redirect to the root (index.html) after logout
                window.location.href = './';
            } catch (error) {
                console.error("Error during logout:", error);
                showMessage(`Logout failed: ${error.message}`, 'error');
            }
        });



    </script>
</body>

</html>
