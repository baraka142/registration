<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css">
    <style>
        .stat-container {
            background-color: #0f172a;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border: 4px solid #a855f7;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6), inset 0 0 15px rgba(168, 85, 247, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-container:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.6), inset 0 0 20px rgba(34, 197, 94, 0.4);
            /* Glow shifts to Green on hover */
            border-color: #22c55e;
        }

        .stat-number {
            font-size: 4rem;
            font-weight: 900;
            color: #f8fafc;
            line-height: 1;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .stat-label {
            font-size: 0.875rem;
            color: #a0aec0;
            /* Gray-400 */
            margin-top: 0.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="theme-card p-12 text-center max-w-lg w-11/12 mx-auto my-auto">
        <h1 class="theme-title mt-4">Admin Command Center</h1>
        <p class="theme-subtitle mb-8">System Overview</p>

        <div class="stat-container" id="tasksContainer">
            <svg id="loadingSpinner" class="spinner h-12 w-12 text-[#a855f7]" xmlns="http://www.w3.org/2000/svg"
                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <div id="tasksData" class="hidden flex flex-col items-center">
                <span class="stat-number" id="totalTasksCount">0</span>
                <span class="stat-label">Total Global Tasks</span>
            </div>
        </div>

        <button id="logoutBtn" class="btn-secondary rounded-full px-8 py-3 mb-4">Log Out</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collectionGroup, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRVqHDVjcXdrIm6OolwzPlaB7LYQFFtFc",
            authDomain: "baraka-bot-registration.firebaseapp.com",
            projectId: "baraka-bot-registration",
            storageBucket: "baraka-bot-registration.firebasestorage.app",
            messagingSenderId: "289777012967",
            appId: "1:289777012967:web:5c59480a4e4e2a13f09242",
            measurementId: "G-EKH2MN7WDR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const ADMIN_EMAIL = 'wangilabaraka@gmail.com';

        const logoutBtn = document.getElementById('logoutBtn');
        const tasksData = document.getElementById('tasksData');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const totalTasksCount = document.getElementById('totalTasksCount');

        // Verify Admin Auth
        onAuthStateChanged(auth, async (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                // User is authenticated as Admin. Fetch data.
                fetchGlobalTasks();
            } else {
                // Not the admin (or not logged in), kick them to login
                window.location.href = 'login.html';
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'login.html';
        });

        // Fetch Total Tasks using a Collection Group Query across all users
        async function fetchGlobalTasks() {
            try {
                // Note: To use collectionGroup('tasks') securely, you must have an indexing rule in Firestore if ordering/filtering.
                // For a simple count, depending on DB size, getDocs might pull all down. 
                // We will aggregate strictly locally since the user base is currently small.
                const tasksQuerySnapshot = await getDocs(collectionGroup(db, 'tasks'));

                let count = tasksQuerySnapshot.size;
                totalTasksCount.textContent = count;

                loadingSpinner.style.display = 'none';
                tasksData.classList.remove('hidden');
            } catch (error) {
                console.error("Error fetching tasks:", error);
                totalTasksCount.textContent = "Error";
                totalTasksCount.style.fontSize = "2rem";
                totalTasksCount.style.color = "#ef4444";

                loadingSpinner.style.display = 'none';
                tasksData.classList.remove('hidden');
            }
        }
    </script>
</body>

</html>
